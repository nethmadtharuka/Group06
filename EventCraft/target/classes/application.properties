spring.application.name=EventCraft

# ===============================
# MONGODB CONFIGURATION
# ===============================
spring.data.mongodb.uri=mongodb://localhost:27017/eventCraftDB

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO

# ===============================
# GOOGLE GEMINI API
# ===============================
google.api.key=your-google-api-key-here

# ===============================
# EMAIL CONFIGURATION
# ===============================
# For Gmail SMTP (replace with your email settings)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@eventcraft.com

# ===============================
# APPLICATION SETTINGS
# ===============================
app.frontend.url=http://localhost:5173
