spring.application.name=EventCraft

# ===============================
# MONGODB CONFIGURATION
# ===============================
# Local MongoDB connection (fallback to localhost if MONGODB_URI not set)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://127.0.0.1:27017/eventcraft}
spring.data.mongodb.database=eventcraft

# ===============================
# SERVER CONFIGURATION
# ===============================
# Use environment variable PORT if available, fallback to 8080
server.port=${PORT:8080}
server.servlet.context-path=/api

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework=INFO
logging.level.com.eventcraft=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.root=WARN

# ===============================
# GOOGLE GEMINI API
# ===============================
# Optional, can be left empty
google.api.key=${GOOGLE_API_KEY:}

# ===============================
# DEVELOPMENT SETTINGS
# ===============================
# Enable devtools for local development
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# ===============================
# JACKSON CONFIGURATION
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Colombo

# ===============================
# SWAGGER/OPENAPI CONFIGURATION
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true